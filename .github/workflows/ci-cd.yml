name: Hatchling CI/CD Pipeline

on:
  push:
    branches: [ main, hatchling-mvp ]
  pull_request:
    branches: [ main, hatchling-mvp ]

env:
  # Set to 'true' to enforce strict validation, 'false' for transitional phase
  ENFORCE_STRICT_VALIDATION: 'false'

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black
        
    - name: Lint with flake8
      run: |
        cd backend
        # Always check for syntax errors and undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # In transitional phase, all other issues are just warnings
        if [ "$ENFORCE_STRICT_VALIDATION" = "true" ]; then
          # Strict mode: fail on warnings
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics
        else
          # Transitional mode: show warnings but don't fail
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        fi
    
    - name: Check formatting with black
      run: |
        cd backend
        if [ "$ENFORCE_STRICT_VALIDATION" = "true" ]; then
          # Strict mode: fail on formatting issues
          black --check --diff .
        else
          # Transitional mode: show formatting issues but don't fail
          black --check --diff . || echo "Formatting issues found, but continuing in transitional mode"
        fi
  
  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd backend
        # Set environment variable for tests to know if they should be strict
        export ENFORCE_STRICT_VALIDATION=$ENFORCE_STRICT_VALIDATION
        python -m unittest discover -s tests
        
    - name: Validate dependencies
      run: |
        cd backend
        # Set environment variable for tests to know if they should be strict
        export ENFORCE_STRICT_VALIDATION=$ENFORCE_STRICT_VALIDATION
        python -m unittest tests.test_services.TestDependencyValidation

  lint-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        npm install --save-dev eslint eslint-plugin-react eslint-plugin-react-hooks @typescript-eslint/eslint-plugin @typescript-eslint/parser
        
    - name: Lint with ESLint
      run: |
        cd frontend
        # Determine error level based on validation mode
        if [ "$ENFORCE_STRICT_VALIDATION" = "true" ]; then
          ERROR_LEVEL="error"
        else
          ERROR_LEVEL="warn"
        fi
        
        npx eslint --no-eslintrc --config - --ext .js,.jsx,.ts,.tsx src <<EOF
        {
          "env": {
            "browser": true,
            "es2021": true,
            "node": true,
            "jest": true
          },
          "extends": [
            "eslint:recommended",
            "plugin:react/recommended",
            "plugin:@typescript-eslint/recommended"
          ],
          "parser": "@typescript-eslint/parser",
          "parserOptions": {
            "ecmaFeatures": {
              "jsx": true
            },
            "ecmaVersion": 12,
            "sourceType": "module"
          },
          "plugins": [
            "react",
            "@typescript-eslint",
            "react-hooks"
          ],
          "rules": {
            "react/react-in-jsx-scope": "off",
            "react-hooks/rules-of-hooks": "${ERROR_LEVEL}",
            "react-hooks/exhaustive-deps": "warn",
            "no-unused-vars": "warn",
            "@typescript-eslint/no-unused-vars": ["warn"],
            "@typescript-eslint/explicit-module-boundary-types": "off",
            "@typescript-eslint/no-explicit-any": "warn"
          },
          "settings": {
            "react": {
              "version": "detect"
            }
          }
        }
        EOF

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-frontend
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run tests
      run: |
        cd frontend
        # Pass environment variable to tests
        ENFORCE_STRICT_VALIDATION=$ENFORCE_STRICT_VALIDATION npm test -- --watchAll=false
        
    - name: Validate dependencies
      run: |
        cd frontend
        # Pass environment variable to tests
        ENFORCE_STRICT_VALIDATION=$ENFORCE_STRICT_VALIDATION npm test -- --watchAll=false --testMatch="**/tests/*test*" -t "Dependency Validation"

  # Dependabot configuration integrated directly into workflow
  dependency-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for vulnerable dependencies
      run: |
        echo "Running dependency vulnerability scan"
        
        # Frontend dependency check
        cd frontend
        if [ "$ENFORCE_STRICT_VALIDATION" = "true" ]; then
          # Strict mode: fail on high vulnerabilities
          npm audit --audit-level=high
        else
          # Transitional mode: report but don't fail
          npm audit --audit-level=high || echo "Vulnerabilities found, but continuing in transitional mode"
        fi
        
        # Backend dependency check
        cd ../backend
        pip install safety
        if [ "$ENFORCE_STRICT_VALIDATION" = "true" ]; then
          # Strict mode: fail on vulnerabilities
          safety check -r requirements.txt --full-report
        else
          # Transitional mode: report but don't fail
          safety check -r requirements.txt --full-report || echo "Vulnerabilities found, but continuing in transitional mode"
        fi

  deploy:
    needs: [test-backend, test-frontend, dependency-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      run: |
        # This would trigger a deploy on Render
        # For actual implementation, you would use Render's API or webhook
        curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
